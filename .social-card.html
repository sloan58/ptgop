<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>PTGOP social card</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300..900;1,9..144,300..900&family=Newsreader:ital,opsz,wght@0,6..72,300..700;1,6..72,300..700&family=Archivo:wght@400..700&display=swap" rel="stylesheet">
<style>
  :root {
    --cream: #F3EBD3;
    --cream-2: #EDE1C1;
    --ink: #0E1B3D;
    --ink-soft: #3A456B;
    --blood: #8E1F2C;
    --brass: #B89968;
    --rule: rgba(14, 27, 61, 0.22);
    --rule-strong: rgba(14, 27, 61, 0.55);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { width: 1200px; height: 630px; overflow: hidden; background: #000; }
  body {
    position: relative;
    background: var(--cream);
    color: var(--ink);
    font-family: 'Newsreader', Georgia, serif;
  }

  /* paper grain */
  .grain {
    position: absolute; inset: 0;
    pointer-events: none;
    opacity: 0.38;
    mix-blend-mode: multiply;
    background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 200 200'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='2' seed='7'/><feColorMatrix values='0 0 0 0 0.055 0 0 0 0 0.106 0 0 0 0 0.239 0 0 0 0.24 0'/></filter><rect width='100%' height='100%' filter='url(%23n)'/></svg>");
  }

  /* soft cream vignette to add warmth */
  .vignette {
    position: absolute; inset: 0;
    pointer-events: none;
    background:
      radial-gradient(1100px 620px at 18% 42%, rgba(255,255,255,0.55), transparent 62%),
      radial-gradient(900px 700px at 92% 88%, rgba(142,31,44,0.10), transparent 65%);
  }

  /* double-rule borders like a broadsheet */
  .frame {
    position: absolute;
    inset: 36px;
    border: 1px solid var(--rule-strong);
  }
  .frame::before {
    content: "";
    position: absolute;
    inset: 6px;
    border: 1px solid var(--rule);
  }

  .plate {
    position: absolute;
    inset: 72px 80px;
    display: grid;
    grid-template-columns: 1fr auto;
    grid-template-rows: auto 1fr auto;
    gap: 0;
  }

  /* top eyebrow */
  .eyebrow {
    grid-column: 1 / -1;
    display: flex;
    align-items: center;
    justify-content: space-between;
    font-family: 'Archivo', sans-serif;
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 0.34em;
    text-transform: uppercase;
    color: var(--ink);
    padding-bottom: 14px;
    border-bottom: 1px solid var(--rule-strong);
  }
  .eyebrow .right { color: var(--ink-soft); font-weight: 500; letter-spacing: 0.32em; }
  .eyebrow .dot { color: var(--blood); margin: 0 0.6em; }

  /* main title */
  .title {
    grid-column: 1 / 2;
    align-self: center;
    padding-right: 40px;
  }
  .kicker {
    font-family: 'Archivo', sans-serif;
    font-size: 14px;
    font-weight: 700;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    color: var(--blood);
    margin-bottom: 22px;
    display: inline-flex;
    align-items: center;
    gap: 14px;
  }
  .kicker .bar {
    display: inline-block;
    width: 42px;
    height: 2px;
    background: var(--blood);
  }

  h1 {
    font-family: 'Fraunces', Georgia, serif;
    font-weight: 500;
    font-size: 136px;
    line-height: 0.92;
    letter-spacing: -0.025em;
    color: var(--ink);
    font-variation-settings: "opsz" 144, "SOFT" 30;
  }
  h1 .italic {
    font-style: italic;
    font-weight: 400;
    color: var(--blood);
  }

  .sub {
    margin-top: 26px;
    font-family: 'Newsreader', Georgia, serif;
    font-size: 28px;
    line-height: 1.35;
    font-style: italic;
    color: var(--ink-soft);
    max-width: 640px;
  }
  .sub em {
    font-style: normal;
    color: var(--ink);
    font-weight: 500;
  }

  /* star seal (right column) */
  .seal {
    grid-column: 2 / 3;
    grid-row: 2 / 3;
    align-self: center;
    justify-self: end;
    position: relative;
    width: 300px;
    height: 300px;
  }
  .seal .ring-outer, .seal .ring-inner {
    position: absolute; inset: 0;
    border-radius: 50%;
    border: 1px solid var(--rule-strong);
  }
  .seal .ring-inner { inset: 14px; border-color: var(--rule); }
  .seal .ring-text {
    position: absolute; inset: 0;
    animation: none;
  }
  .seal svg { width: 100%; height: 100%; display: block; }

  .seal .star-badge {
    position: absolute;
    inset: 34px;
    background: var(--ink);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow:
      inset 0 0 0 2px var(--cream),
      inset 0 0 0 3px var(--ink),
      0 14px 28px rgba(14,27,61,0.22);
  }
  .star-badge .star {
    color: var(--cream);
    font-size: 150px;
    line-height: 1;
    font-family: 'Fraunces', Georgia, serif;
    transform: translateY(-6px);
  }
  .star-badge .star-blood {
    position: absolute;
    color: var(--blood);
    font-size: 150px;
    line-height: 1;
    font-family: 'Fraunces', Georgia, serif;
    transform: translate(4px, -2px);
    mix-blend-mode: screen;
    opacity: 0.85;
  }

  /* bottom bar */
  .footer {
    grid-column: 1 / -1;
    display: flex;
    align-items: center;
    justify-content: space-between;
    font-family: 'Archivo', sans-serif;
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 0.32em;
    text-transform: uppercase;
    color: var(--ink);
    padding-top: 16px;
    border-top: 1px solid var(--rule-strong);
  }
  .footer .tag { color: var(--ink); }
  .footer .url { color: var(--blood); }
  .footer .dot { color: var(--brass); margin: 0 0.6em; }
</style>
</head>
<body>
  <div class="vignette"></div>

  <div class="frame"></div>

  <div class="plate">
    <div class="eyebrow">
      <span class="left">The Republican Committee <span class="dot">&#9733;</span> Peters Township, Pennsylvania</span>
      <span class="right">Estd. in service</span>
    </div>

    <div class="title">
      <div class="kicker">Twelve Precincts &middot; Twenty-Four Neighbors</div>
      <h1>Peters<br>Township<span class="italic">.</span></h1>
      <div class="sub">One shared commitment. <em>Find your precinct, meet your committee, get involved.</em></div>
    </div>

    <div class="seal" aria-hidden="true">
      <div class="ring-outer"></div>
      <div class="ring-inner"></div>
      <div class="star-badge">
        <span class="star-blood">&#9733;</span>
        <span class="star">&#9733;</span>
      </div>
    </div>

    <div class="footer">
      <span class="tag">PTGOP <span class="dot">&#9733;</span> Civic. Local. Neighborly.</span>
      <span class="url">ptgop.com</span>
    </div>
  </div>

  <div class="grain"></div>
</body>
</html>
